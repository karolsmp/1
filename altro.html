<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alessandro Bernini | Creazioni</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* --- RESET E BASE --- */
        body, html {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-image: url('LogoABSfondo4.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            position: relative;
            /* Flexbox per gestire la distribuzione tra contenuto e footer */
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        /* --- MENU DI NAVIGAZIONE --- */
        nav.ribbon-menu {
            width: 100%;
            background-color: #000000;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            height: 70px;
        }

        nav.ribbon-menu ul {
            list-style-type: none;
            margin: 0;
            padding: 0 10px;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .ribbon-menu li { position: relative; display: flex; align-items: center; height: 100%; }
        .ribbon-menu li:nth-child(3) { margin-left: auto; }

        .ribbon-menu li a {
            display: block;
            color: #ffffff;
            text-align: center;
            padding: 6px 15px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ffffff;
            margin: 0 4px;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* Effetto hover che inverte i colori */
        .ribbon-menu li a:hover,
        .dropdown:hover > a {
            background-color: #ffffff;
            color: #000000 !important;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 4px;
            background-color: #000000;
            min-width: 180px;
            border: 1px solid #ffffff;
            z-index: 1001;
        }

        .dropdown-content a {
            color: #ffffff !important;
            padding: 12px 16px;
            text-align: left;
            border: none !important;
            border-bottom: 1px solid #ffffff !important;
            display: block;
            font-size: 14px;
            margin: 0 !important;
        }

        .dropdown-content a:last-child { border-bottom: none !important; }

        /* Hover interno alla tendina */
        .dropdown-content a:hover {
            background-color: #ffffff;
            color: #000000 !important;
        }

        .dropdown:hover .dropdown-content { display: block; }

        /* --- LAYOUT SPLIT SCREEN --- */
        .container-main {
            display: flex;
            height: calc(100vh - 130px); /* Sottratta l'altezza di navbar + footer */
            padding-top: 70px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .left-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5% 10%;
            position: relative;
        }

        .text-content {
            position: absolute;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            max-width: 450px;
        }

        .text-content.active { opacity: 1; position: relative; }

        h1 { font-size: 2.5rem; margin-bottom: 20px; text-transform: uppercase; }
        p { line-height: 1.6; color: #ccc; font-size: 1.1rem; }

        /* --- PARTE DESTRA: CAROSELLI --- */
        .right-side {
            width: 50%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .right-side::-webkit-scrollbar { display: none; }

        .image-panel {
            height: calc(100vh - 130px); /* Allineato all'altezza del container principale */
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
        }

        .carousel {
            width: 85%;
            height: 75%;
        }

        .carousel-inner, .carousel-item { height: 100%; }

        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .carousel-control-prev, .carousel-control-next {
            width: 50px;
            background: rgba(0,0,0,0.2);
        }

        /* --- FOOTER (IDENTICO) --- */
        footer {
            background-color: #0f172a;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1002; /* Sopra al velo trasparente */
            height: 60px;
            box-sizing: border-box;
        }

        .footer-right img {
            width: 30px;
            height: 30px;
            transition: transform 0.3s ease;
        }

        .footer-right img:hover {
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .container-main { flex-direction: column; overflow-y: auto; height: auto; }
            .left-side, .right-side { width: 100%; height: auto; }
            .image-panel { height: 60vh; }
        }
    </style>
</head>
<body>

<nav class="ribbon-menu">

        <div class="image-panel" data-target="text-2">

        <div class="image-panel" data-target="text-3">

        <div class="image-panel" data-target="text-4">

                <button class="carousel-control-next" type="button" data-bs-target="#carousel4" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const panels = document.querySelectorAll('.image-panel');
    const texts = document.querySelectorAll('.text-content');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const targetId = entry.target.getAttribute('data-target');
                texts.forEach(t => t.classList.remove('active'));
                const activeText = document.getElementById(targetId);
                if (activeText) activeText.classList.add('active');
            }
        });
    }, { threshold: 0.6 });

    panels.forEach(panel => observer.observe(panel));
</script>
