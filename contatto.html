<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota un Appuntamento - Alessandro Bernini</title>
    <style>
        :root {
            --primary: #000000;
            --glass: rgba(255, 255, 255, 0.98);
        }

        /* --- RESET E BACKGROUND --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif; /* Font coerente con il menu */
            display: flex;
            flex-direction: column;
            background-image: url('LogoABSfondo3.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-color: #000;
        }

        /* --- MENU DI NAVIGAZIONE --- */
        nav.ribbon-menu {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background-color: #000000;
            height: 70px;
        }

        nav.ribbon-menu ul {
            list-style-type: none;
            margin: 0;
            padding: 0 10px;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .ribbon-menu li {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* Sposta Chi Sono e Contatto a destra */
        .ribbon-menu li:nth-child(3) {
            margin-left: auto;
        }

        .ribbon-menu li a {
            display: block;
            color: #ffffff;
            text-align: center;
            padding: 6px 15px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ffffff;
            margin: 0 4px;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* Hover: Inversione colori */
        .ribbon-menu li a:hover, .dropdown:hover > a {
            background-color: #ffffff;
            color: #000000 !important;
        }

        /* Tendina uniforme */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 4px;
            background-color: #000000;
            min-width: 180px;
            border: 1px solid #ffffff;
            z-index: 1001;
        }

        .dropdown-content a {
            color: #ffffff !important;
            padding: 12px 16px;
            text-align: left;
            border: none !important;
            border-bottom: 1px solid #ffffff !important;
            margin: 0 !important;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:last-child {
            border-bottom: none !important;
        }

        .dropdown-content a:hover {
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* --- CONTENITORE CENTRALE --- */
        .main-wrapper {
            flex: 1;
            padding-top: 110px; /* Spazio per la navbar + distacco */
            padding-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        /* --- STILE FORM PRENOTAZIONE --- */
        .booking-container {
            background: var(--glass);
            max-width: 500px;
            width: 90%;
            padding: 2.5rem;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #000;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            color: #000;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .header p { color: #666; font-size: 0.85rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        .field { margin-bottom: 15px; }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 0;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        input:focus, select:focus {
            border-color: #000;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: #000;
            color: white;
            padding: 15px;
            border: 1px solid #000;
            border-radius: 0;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: transparent;
            color: #000;
        }

        /* --- FOOTER (IDENTICO) --- */
        footer {
            background-color: #0f172a;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1002;
            height: 60px;
            box-sizing: border-box;
            width: 100%;
        }

        .footer-right img {
            width: 30px;
            height: 30px;
            transition: transform 0.3s ease;
        }

        .footer-right img:hover {
            transform: scale(1.2);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .main-wrapper { padding-top: 100px; }
            nav.ribbon-menu ul { font-size: 10px; }
            .ribbon-menu li a { padding: 5px 10px; margin: 0 2px; }
        }
    </style>
</head>
<body>

<nav class="ribbon-menu">
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li class="dropdown">
            <a href="#">CREAZIONI</a>
            <div class="dropdown-content">
                <a href="rapperitaliani.html">RAPPER ITALIANI</a>
                <a href="rapperesteri.html">RAPPER ESTERI</a>
                <a href="altro.html">ALTRO</a>
            </div>
        </li>
        <li><a href="chisono.html">CHI SONO</a></li>
        <li><a href="contatto.html">CONTATTO</a></li>
    </ul>
</nav>

<div class="main-wrapper">
    <div class="booking-container">
        <div class="header">
            <h1>Prenota Ora</h1>
            <p>Scegli il momento migliore per la tua consulenza</p>
        </div>

        <form action="#" method="POST">
            <div class="form-grid">
                <div class="field full-width">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Mario Rossi" required>
                </div>

                <div class="field full-width">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="esempio@mail.com" required>
                </div>

                <div class="field">
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" required>
                </div>

                <div class="field">
                    <label for="ora">Orario</label>
                    <select id="ora" name="ora" required>
                        <option value="">Scegli...</option>
                        <option value="09:00">09:00</option>
                        <option value="10:00">10:00</option>
                        <option value="11:30">11:30</option>
                        <option value="15:00">15:00</option>
                        <option value="16:30">16:30</option>
                    </select>
                </div>

                <div class="field full-width">
                    <label for="servizio">Tipo di Servizio</label>
                    <select id="servizio" name="servizio">
                        <option value="consulenza">Consulenza Gratuita</option>
                        <option value="sessione">Progettazione Gioiello</option>
                        <option value="altro">Altro</option>
                    </select>
                </div>

                <div class="field full-width">
                    <label for="note">Richieste Particolari</label>
                    <textarea id="note" name="note" rows="3" placeholder="Scrivi qui..."></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">Conferma Prenotazione</button>
        </form>
    </div>
</div>

<footer>
    <div>© 2026 Alessandro Bernini</div>
    <div class="footer-right">
        <a href="https://www.instagram.com/alessandro_bernini?igsh=YXF6OWo0amptY2Ix" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
        </a>
    </div>
</footer>

</body>
</html>
