<!DOCTYPE html>
<html lang="it">
<head>
    <title>Progetto - Alessandro Bernini</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* --- RESET E RIMOZIONE SCROLL --- */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            background-image: url('LogoABSfondo3.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-color: #000; /* Fallback nero */
        }

        /* --- MENU DI NAVIGAZIONE --- */
        nav.ribbon-menu ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #000000;
            align-items: center;
            height: 60px;
        }

        .ribbon-menu li {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .ribbon-menu li:nth-child(3) {
            margin-left: auto;
        }

        .ribbon-menu li a {
            display: block;
            color: #ffffff;
            text-align: center;
            padding: 8px 20px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ffffff;
            margin: 0 5px;
            transition: all 0.3s ease;
        }

        .ribbon-menu li a:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- TENDINA (DROPDOWN) AGGIORNATA --- */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 5px;
            background-color: #000000;
            min-width: 180px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            z-index: 100;
            border: 1px solid #ffffff;
        }

        .dropdown-content a {
            color: #ffffff !important;
            padding: 12px 16px;
            text-align: left;
            border: none !important;
            /* LINEA ORIZZONTALE BIANCA TRA LE VOCI */
            border-bottom: 1px solid #ffffff !important;
            margin: 0 !important;
            display: block;
        }

        /* Rimuove l'ultima linea per non sovrapporsi al bordo del contenitore */
        .dropdown-content a:last-child {
            border-bottom: none !important;
        }

        .dropdown-content a:hover {
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* --- CONTENUTO CENTRALE --- */
        main {
            flex: 1;
        }

        /* --- FOOTER --- */
        footer {
            background-color: #0f172a;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-right img {
            width: 30px;
            height: 30px;
            transition: transform 0.3s ease;
        }

        .footer-right img:hover {
            transform: scale(1.2);
        }

        @media (max-width: 600px) {
            nav.ribbon-menu ul {
                flex-direction: row;
                font-size: 10px;
            }
            .ribbon-menu li a {
                padding: 5px 10px;
                margin: 0 2px;
            }
        }
    </style>
</head>
<body>

<nav class="ribbon-menu">

                <a href="altro.html">ALTRO</a>
            </div>
        </li>
        <li><a href="chisono.html">CHI SONO</a></li>
        <li><a href="contatto.html">CONTATTO</a></li>
    </ul>
</nav>

        </a>
    </div>
</footer>

</body>
</html>
