    <style>
        /* --- RESET E BACKGROUND --- */
        body, html {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-image: url('LogoABSfondo4.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            position: relative;
        }

        /* --- VELO TRASPARENTE FULL SCREEN --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Modifica lo 0.6 per scurire di più o di meno */
            z-index: 0;
        }

        /* --- MENU DI NAVIGAZIONE --- */
        nav.ribbon-menu {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background-color: #000000;
        }

        nav.ribbon-menu ul {
            list-style-type: none;
            margin: 0;
            padding: 0 10px;
            display: flex;
            align-items: center;
            height: 70px;
        }

        .ribbon-menu li {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .ribbon-menu li:nth-last-child(2) { margin-left: auto; }

        .ribbon-menu li a {
            display: block;
            color: #ffffff;
            text-align: center;
            padding: 6px 15px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ffffff;
            margin: 0 4px;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .ribbon-menu li a:hover, .dropdown:hover > a {
            background-color: #ffffff;
            color: #000000;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 4px;
            background-color: #000000;
            min-width: 180px;
            border: 1px solid #ffffff;
            z-index: 1001;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
        }

        .dropdown-content a {
            color: #ffffff !important;
            padding: 12px 16px;
            text-align: left;
            border: none !important;
            border-bottom: 1px solid #ffffff !important;
            margin: 0 !important;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
        }

        .dropdown-content a:last-child {
            border-bottom: none !important;
        }

        .dropdown-content a:hover {
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        .dropdown:hover .dropdown-content { display: block; }

        /* --- LAYOUT CONTENUTI --- */
        .container-main {
            display: flex;
            height: 100vh;
            padding-top: 70px;
            box-sizing: border-box;
            position: relative;
            z-index: 1; /* Assicura che i contenuti stiano sopra il velo scuro */
        }

        .left-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5% 10%;
            position: relative;
        }

        .text-content {
            position: absolute;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            max-width: 450px;
        }

        .text-content.active { opacity: 1; position: relative; }

        h1 { font-size: 2.5rem; margin-bottom: 20px; text-transform: uppercase; }
        p { line-height: 1.6; color: #ccc; font-size: 1.1rem; }

        .right-side {
            width: 50%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .right-side::-webkit-scrollbar { display: none; }

        .image-panel {
            height: calc(100vh - 70px);
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MODIFICATO: Ora il carosello è molto più grande (prende l'80% dell'altezza disponibile) ed è un quadrato perfetto */
        .carousel {
            height: 80%;
            aspect-ratio: 1 / 1; /* Mantiene la proporzione quadrata identica alla tua foto */
            width: auto; /* Permette alla larghezza di calcolarsi automaticamente in base all'altezza per fare il quadrato */
        }

        .carousel-inner, .carousel-item {
            height: 100%;
        }

        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Taglia l'immagine senza deformarla se non è quadrata */
            border: 1px solid rgba(255,255,255,0.3);
        }

        .carousel-control-prev, .carousel-control-next {
            width: 50px;
            background: rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            .container-main { flex-direction: column; overflow-y: auto; }
            .left-side, .right-side { width: 100%; height: auto; }
            .image-panel { height: 60vh; padding: 20px 0; }
            .carousel { height: 100%; width: 85vw; max-height: 85vw; } /* Responsive su Mobile */
            nav.ribbon-menu ul { height: auto; padding: 10px; flex-wrap: wrap; justify-content: center; }
            .ribbon-menu li { margin: 5px 0; }
        }
    </style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const panels = document.querySelectorAll('.image-panel');
    const texts = document.querySelectorAll('.text-content');
    const observerOptions = { root: document.getElementById('image-scroll'), threshold: 0.6 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const targetId = entry.target.getAttribute('data-target');
                texts.forEach(t => t.classList.remove('active'));
                const activeText = document.getElementById(targetId);
                if (activeText) activeText.classList.add('active');
            }
        });
    }, observerOptions);
    panels.forEach(panel => observer.observe(panel));
</script>
